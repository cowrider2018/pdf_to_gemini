<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gemini PDF Injector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 頁首裝飾 -->
    <div class="header-decoration"></div>
    
    <!-- 標題區域 -->
    <div class="header">
      <div class="title-icon">📖</div>
      <div>
        <h1 class="main-title">幫你讀PDF</h1>
        <p class="subtitle">批量上傳工具</p>
      </div>
    </div>
    
    <!-- 分隔線 -->
    <div class="divider"></div>
    
    <!-- 表單區域 -->
    <div class="form-section">
      <!-- PDF 檔案選擇 -->
      <div class="field">
        <label class="label-icon">📄 本地 PDF 檔案</label>
        <!-- 隱藏的原生輸入框 -->
        <input id="pdfFile" type="file" accept="application/pdf" style="display: none;" />
        
        <!-- 美化的拖放上傳區域 -->
        <div id="pdfUploadArea" class="pdf-upload-area">
          <div class="upload-icon">📁</div>
          <p class="upload-text">拖放 PDF 檔案到此</p>
          <p class="upload-subtext">或點擊選擇</p>
          <div id="fileName" class="file-name"></div>
        </div>
      </div>
      
      <!-- 頁碼選擇 -->
      <div class="field">
        <label class="label-icon">📑 頁碼選擇</label>
        <input id="pages" type="text" placeholder="例如：1 或 1,3-5" value="1" class="pages-input" />
        <p class="hint-text">💡 支持多頁面：如 1,3-5 表示第1、3、4、5頁</p>
      </div>
      
      <!-- 控制面板 -->
      <div class="controls">
        <label class="checkbox-label">
          <input type="checkbox" id="doSend" checked>
          <span>自動送出</span>
        </label>
      </div>
      
      <!-- 操作按鈕 -->
      <button id="uploadPdfBtn" class="btn-primary">上傳 PDF 並插入圖片</button>
      
      <!-- 裝飾角 -->
      <div class="corner-decoration"></div>
    </div>
    
    <!-- 狀態區域 -->
    <div id="status" class="status"></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
